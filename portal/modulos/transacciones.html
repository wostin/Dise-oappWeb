<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transacciones — Mi Banco</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="dashboard.html"><i class="bi bi-bank me-2"></i>MI BANCO</a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white d-none d-sm-inline small">
        <i class="bi bi-person-circle me-1"></i><span id="userName">Cliente</span>
      </span>
      <button class="btn btn-sm btn-light fw-bold" id="btnLogout">Salir</button>
    </div>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse border-end min-vh-100 py-4">
      <ul class="nav flex-column gap-2">
        <li class="nav-item"><a class="nav-link text-dark" href="dashboard.html"><i class="bi bi-grid-1x2 me-2"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active fw-bold text-primary" href="transacciones.html"><i class="bi bi-arrow-left-right me-2"></i> Transacciones</a></li>
        <li class="nav-item"><a class="nav-link text-dark" href="pagos.html"><i class="bi bi-credit-card me-2"></i> Pagos</a></li>
        <li class="nav-item"><a class="nav-link text-dark" href="prestamos.html"><i class="bi bi-cash-stack me-2"></i> Préstamos</a></li>
        <li class="nav-item"><a class="nav-link text-dark" href="ahorro.html"><i class="bi bi-piggy-bank me-2"></i> Ahorro</a></li>
      </ul>
    </nav>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
      <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
          <h4 class="fw-bold mb-0 text-primary">Historial de Transacciones</h4>
          <p class="text-muted small mb-0">Visualiza y filtra tus últimos movimientos bancarios.</p>
        </div>
      </div>

      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label small fw-bold">Movimiento</label>
              <select id="filtroTipo" class="form-select border-0 bg-light">
                <option value="">Todos los tipos</option>
                <option value="debito">Egresos (Débito)</option>
                <option value="credito">Ingresos (Crédito)</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-bold">Desde</label>
              <input type="date" id="filtroDesde" class="form-control border-0 bg-light">
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-bold">Hasta</label>
              <input type="date" id="filtroHasta" class="form-control border-0 bg-light">
            </div>
            <div class="col-md-3 d-flex gap-2">
              <button class="btn btn-primary w-100 fw-bold" id="btnFiltrar"><i class="bi bi-search me-2"></i>Filtrar</button>
              <button class="btn btn-outline-secondary" id="btnLimpiar"><i class="bi bi-eraser"></i></button>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4 text-center">
        <div class="col-6 col-lg-3">
          <div class="card border-0 shadow-sm p-3">
            <span class="text-muted small d-block mb-1">Operaciones</span>
            <span class="h4 fw-bold mb-0" id="resTotal">0</span>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="card border-0 shadow-sm p-3">
            <span class="text-muted small d-block mb-1">Total Débitos</span>
            <span class="h4 fw-bold mb-0 text-danger" id="resDebitos">S/ 0.00</span>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="card border-0 shadow-sm p-3">
            <span class="text-muted small d-block mb-1">Total Créditos</span>
            <span class="h4 fw-bold mb-0 text-success" id="resCreditos">S/ 0.00</span>
          </div>
        </div>
        <div class="col-6 col-lg-3">
          <div class="card border-0 shadow-sm p-3 border-bottom border-4" id="netoContainer">
            <span class="text-muted small d-block mb-1">Balance Neto</span>
            <span class="h4 fw-bold mb-0" id="resNeto">S/ 0.00</span>
          </div>
        </div>
      </div>

      <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="bg-primary text-white">
              <tr>
                <th class="ps-4 py-3">Fecha</th>
                <th>Descripción</th>
                <th>Cuenta Origen</th>
                <th class="text-end pe-4">Monto</th>
              </tr>
            </thead>
            <tbody id="txnBody">
              </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { supabase, requireAuth, formatSoles, formatFecha } from '../js/supabase.js';

  const user = await requireAuth();
  document.getElementById('userName').textContent = user.user_metadata?.full_name?.split(' ')[0] || user.email;

  // Logout
  document.getElementById('btnLogout').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.assign('../index.html');
  });

  // RF-12, RF-13 & RF-15: Carga con filtros
  async function cargarTransacciones() {
    const tbody = document.getElementById('txnBody');
    tbody.innerHTML = `<tr><td colspan="4" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>`;

    const tipo = document.getElementById('filtroTipo').value;
    const desde = document.getElementById('filtroDesde').value;
    const hasta = document.getElementById('filtroHasta').value;

    let query = supabase
      .from('transacciones')
      .select('*, cuentas(tipo, numero_cuenta)') // RF-12: Join con cuentas
      .eq('user_id', user.id)
      .order('fecha', { ascending: false })
      .limit(20); // RF-15: Límite de 20

    // Aplicar filtros dinámicos (RF-13)
    if (tipo) query = query.eq('tipo', tipo);
    if (desde) query = query.gte('fecha', desde);
    if (hasta) query = query.lte('fecha', hasta + 'T23:59:59');

    const { data: txns, error } = await query;

    if (error) {
      tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Error al cargar datos</td></tr>`;
      return;
    }

    renderTabla(txns);
    renderResumen(txns);
  }

  function renderTabla(txns) {
    const tbody = document.getElementById('txnBody');
    if (txns.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" class="text-center py-5 text-muted">No se encontraron movimientos.</td></tr>`;
      return;
    }

    tbody.innerHTML = txns.map(t => `
      <tr>
        <td class="ps-4 small text-muted">${formatFecha(t.fecha)}</td>
        <td>
          <div class="d-flex align-items-center gap-2">
            <i class="bi ${t.tipo === 'debito' ? 'bi-arrow-up-right text-danger' : 'bi-arrow-down-left text-success'} fs-5"></i>
            <span class="fw-bold small">${t.descripcion}</span>
          </div>
        </td>
        <td class="small text-muted">
          ${t.cuentas ? (t.cuentas.tipo === 'corriente' ? 'Cta. Corriente' : 'Cta. Ahorros') : '—'} 
          <span class="d-block text-uppercase" style="font-size: 0.65rem;">•••• ${t.cuentas?.numero_cuenta?.slice(-4) || ''}</span>
        </td>
        <td class="text-end pe-4 fw-bold ${t.tipo === 'debito' ? 'text-danger' : 'text-success'}">
          ${t.tipo === 'debito' ? '- ' : '+ '}${formatSoles(t.monto)}
        </td>
      </tr>
    `).join('');
  }

  // RF-14: Lógica de Resumen
  function renderResumen(txns) {
    const debitos = txns.filter(t => t.tipo === 'debito').reduce((s, t) => s + Number(t.monto), 0);
    const creditos = txns.filter(t => t.tipo === 'credito').reduce((s, t) => s + Number(t.monto), 0);
    const neto = creditos - debitos;

    document.getElementById('resTotal').textContent = txns.length;
    document.getElementById('resDebitos').textContent = `- ${formatSoles(debitos)}`;
    document.getElementById('resCreditos').textContent = `+ ${formatSoles(creditos)}`;
    
    const resNeto = document.getElementById('resNeto');
    const container = document.getElementById('netoContainer');
    
    resNeto.textContent = formatSoles(neto);
    resNeto.className = `h4 fw-bold mb-0 ${neto >= 0 ? 'text-success' : 'text-danger'}`;
    container.className = `card border-0 shadow-sm p-3 border-bottom border-4 ${neto >= 0 ? 'border-success' : 'border-danger'}`;
  }

  document.getElementById('btnFiltrar').addEventListener('click', cargarTransacciones);
  document.getElementById('btnLimpiar').addEventListener('click', () => {
    document.getElementById('filtroTipo').value = '';
    document.getElementById('filtroDesde').value = '';
    document.getElementById('filtroHasta').value = '';
    cargarTransacciones();
  });

  cargarTransacciones();
</script>
</body>
</html>
