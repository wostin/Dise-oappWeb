<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagos — Mi Banco</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="dashboard.html"><i class="bi bi-bank me-2"></i>MI BANCO</a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white d-none d-sm-inline small"><i class="bi bi-person-circle me-1"></i><span id="userName">Cliente</span></span>
      <button class="btn btn-sm btn-light fw-bold" id="btnLogout">Salir</button>
    </div>
  </div>
</nav>

<div class="modal fade" id="modalConfirmar" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-light">
        <h5 class="modal-title fw-bold"><i class="bi bi-shield-check text-success me-2"></i>Confirmar Pago</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" id="btnCloseModal"></button>
      </div>
      <div class="modal-body">
        <div class="p-3 mb-3 bg-light rounded shadow-sm">
          <div class="row g-2 small">
            <div class="col-5 text-muted">Servicio:</div><div class="col-7 fw-bold" id="confServicio"></div>
            <div class="col-5 text-muted">Contrato:</div><div class="col-7 fw-bold" id="confContrato"></div>
            <div class="col-5 text-muted">Monto:</div><div class="col-7 fw-bold text-danger fs-5" id="confMonto"></div>
            <div class="col-5 text-muted">Desde:</div><div class="col-7 fw-bold" id="confCuenta"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-outline-secondary px-4" data-bs-dismiss="modal" id="btnCancelarPago">Cancelar</button>
        <button class="btn btn-success px-4 fw-bold" id="btnConfirmarPago">
          <span id="btnConfText">Confirmar y Pagar</span>
          <span id="btnConfSpinner" class="d-none"><span class="spinner-border spinner-border-sm me-2"></span>Procesando...</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse border-end min-vh-100 py-4">
      <ul class="nav flex-column gap-2">
        <li class="nav-item"><a class="nav-link text-dark" href="dashboard.html"><i class="bi bi-grid-1x2 me-2"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link text-dark" href="transacciones.html"><i class="bi bi-arrow-left-right me-2"></i> Transacciones</a></li>
        <li class="nav-item"><a class="nav-link active fw-bold text-primary" href="pagos.html"><i class="bi bi-credit-card me-2"></i> Pagos</a></li>
        <li class="nav-item"><a class="nav-link text-dark" href="prestamos.html"><i class="bi bi-cash-stack me-2"></i> Préstamos</a></li>
        <li class="nav-item"><a class="nav-link text-dark" href="ahorro.html"><i class="bi bi-piggy-bank me-2"></i> Ahorro</a></li>
      </ul>
    </nav>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
      <h4 class="fw-bold text-primary mb-4"><i class="bi bi-credit-card-2-front me-2"></i>Pago de Servicios</h4>

      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card border-0 shadow-sm p-3">
            <form id="formPago">
              <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Selecciona el Servicio</label>
                <div class="row g-2">
                  <div class="col-4"><input type="radio" class="btn-check" name="servicio" id="sAgua" value="agua" required><label class="btn btn-outline-primary w-100 py-3" for="sAgua"><i class="bi bi-droplet d-block fs-4"></i>Agua</label></div>
                  <div class="col-4"><input type="radio" class="btn-check" name="servicio" id="sLuz" value="luz"><label class="btn btn-outline-warning w-100 py-3" for="sLuz"><i class="bi bi-lightning d-block fs-4"></i>Luz</label></div>
                  <div class="col-4"><input type="radio" class="btn-check" name="servicio" id="sTel" value="telefono"><label class="btn btn-outline-success w-100 py-3" for="sTel"><i class="bi bi-phone d-block fs-4"></i>Tel</label></div>
                </div>
              </div>
              <div class="mb-3"><label class="form-label small fw-bold">Número de Contrato</label><input type="text" id="contrato" class="form-control bg-light border-0" placeholder="Ej: 1029384" required></div>
              <div class="mb-3"><label class="form-label small fw-bold">Monto (S/)</label><input type="number" id="montoPago" class="form-control bg-light border-0" step="0.01" min="1" required></div>
              <div class="mb-4"><label class="form-label small fw-bold">Cuenta de Origen</label><select id="cuentaOrigen" class="form-select bg-light border-0" required><option value="">Selecciona cuenta...</option></select></div>
              <button type="submit" id="btnSubmitPago" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Continuar Pago</button>
            </form>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card border-0 shadow-sm h-100">
            <div class="card-header bg-white py-3 border-0"><h6 class="fw-bold mb-0">Historial Reciente</h6></div>
            <div class="card-body p-0" id="historialPagos">
               </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { supabase, requireAuth, formatSoles, formatFecha } from '../js/supabase.js';

  const user = await requireAuth();
  const modalElement = document.getElementById('modalConfirmar');
  const modal = new bootstrap.Modal(modalElement);
  let datosPago = null;
  let cuentasData = [];

  // UI Elements
  const userNameEl = document.getElementById('userName');
  const btnLogout = document.getElementById('btnLogout');
  const btnConfirmarPago = document.getElementById('btnConfirmarPago');
  const btnConfText = document.getElementById('btnConfText');
  const btnConfSpinner = document.getElementById('btnConfSpinner');

  userNameEl.textContent = user.user_metadata?.full_name?.split(' ')[0] || user.email;

  // 1. CARGAR CUENTAS (Con saldo fresco)
  async function cargarCuentas() {
    const { data, error } = await supabase
      .from('cuentas')
      .select('*')
      .eq('user_id', user.id);
    
    if (error) return console.error(error);
    
    cuentasData = data || [];
    const select = document.getElementById('cuentaOrigen');
    select.innerHTML = '<option value="">Selecciona cuenta...</option>' + 
      cuentasData.map(c => `<option value="${c.id}">${c.tipo.toUpperCase()} - ${formatSoles(c.saldo)}</option>`).join('');
  }

  // 2. PRE-VALIDACIÓN (Antes de abrir el modal)
  document.getElementById('formPago').addEventListener('submit', (e) => {
    e.preventDefault();
    const cId = document.getElementById('cuentaOrigen').value;
    const monto = parseFloat(document.getElementById('montoPago').value);
    const cuenta = cuentasData.find(c => c.id === cId);

    if (!cuenta) return alert('Selecciona una cuenta válida.');
    
    // Validación de Saldo Inmediata
    if (cuenta.saldo < monto) {
      return alert(`⚠️ Saldo insuficiente. Tu saldo actual es ${formatSoles(cuenta.saldo)}`);
    }

    datosPago = { 
      servicio: document.querySelector('input[name="servicio"]:checked').value,
      contrato: document.getElementById('contrato').value,
      monto: monto,
      cId: cId,
      cLabel: cuenta.tipo.toUpperCase(),
      saldoAnterior: cuenta.saldo
    };

    // Llenar Modal
    document.getElementById('confServicio').textContent = datosPago.servicio.toUpperCase();
    document.getElementById('confContrato').textContent = datosPago.contrato;
    document.getElementById('confMonto').textContent = formatSoles(monto);
    document.getElementById('confCuenta').textContent = datosPago.cLabel;
    
    modal.show();
  });

  // 3. PROCESO DE PAGO FINAL (Botón del Modal)
  btnConfirmarPago.addEventListener('click', async () => {
    // Bloqueo total para evitar clics múltiples/simultáneos
    btnConfirmarPago.disabled = true;
    document.getElementById('btnCloseModal').disabled = true;
    document.getElementById('btnCancelarPago').disabled = true;
    
    btnConfText.classList.add('d-none'); 
    btnConfSpinner.classList.remove('d-none');

    try {
      // A. DESCONTAR SALDO (Operación Crítica)
      const nuevoSaldo = datosPago.saldoAnterior - datosPago.monto;
      const { error: errS } = await supabase
        .from('cuentas')
        .update({ saldo: nuevoSaldo })
        .eq('id', datosPago.cId)
        .eq('user_id', user.id); // Seguridad extra

      if (errS) throw new Error("Error al actualizar saldo");

      // B. REGISTRAR EN TABLA PAGOS
      await supabase.from('pagos').insert({
        user_id: user.id,
        servicio: datosPago.servicio,
        numero_contrato: datosPago.contrato,
        monto: datosPago.monto,
        estado: 'completado'
      });

      // C. REGISTRAR EN TRANSACCIONES (Para el Dashboard)
      await supabase.from('transacciones').insert({
        user_id: user.id,
        cuenta_id: datosPago.cId,
        tipo: 'egreso',
        monto: datosPago.monto,
        descripcion: `Pago Servicio: ${datosPago.servicio.toUpperCase()}`
      });

      // ÉXITO
      modal.hide();
      alert('✅ Pago realizado con éxito. Tu nuevo saldo es ' + formatSoles(nuevoSaldo));
      
      // Resetear Formulario y Recargar Datos
      document.getElementById('formPago').reset();
      await cargarCuentas(); 
      await cargarHistorial();

    } catch (error) {
      console.error(error);
      alert('❌ Error al procesar el pago. Inténtalo de nuevo.');
    } finally {
      // Liberar botones
      btnConfirmarPago.disabled = false;
      document.getElementById('btnCloseModal').disabled = false;
      document.getElementById('btnCancelarPago').disabled = false;
      btnConfText.classList.remove('d-none'); 
      btnConfSpinner.classList.add('d-none');
    }
  });

  // 4. CARGAR HISTORIAL DE PAGOS
  async function cargarHistorial() {
    const { data, error } = await supabase
      .from('pagos')
      .select('*')
      .eq('user_id', user.id)
      .order('fecha', { ascending: false })
      .limit(6);
    
    const container = document.getElementById('historialPagos');
    if (!data?.length) {
      container.innerHTML = '<p class="text-center p-4 small text-muted">Aún no has realizado pagos.</p>';
      return;
    }
    
    container.innerHTML = `<ul class="list-group list-group-flush">${data.map(p => `
      <li class="list-group-item d-flex justify-content-between p-3 border-bottom">
        <div>
          <span class="fw-bold d-block small text-capitalize"><i class="bi bi-receipt me-1"></i>${p.servicio}</span>
          <span class="text-muted" style="font-size:0.7rem">${formatFecha(p.fecha)}</span>
        </div>
        <div class="text-end">
          <span class="fw-bold text-danger d-block small">-${formatSoles(p.monto)}</span>
          <span class="badge bg-success bg-opacity-10 text-success" style="font-size:0.6rem">OK</span>
        </div>
      </li>`).join('')}</ul>`;
  }

  // LOGOUT
  btnLogout.addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.replace('../index.html');
  });

  // INICIO
  cargarCuentas(); 
  cargarHistorial();
</script>

<style>
  .btn-check:checked + .btn-outline-primary { background-color: #0d6efd; color: white; }
  .btn-check:checked + .btn-outline-warning { background-color: #ffc107; color: black; }
  .btn-check:checked + .btn-outline-success { background-color: #198754; color: white; }
</style>

</body>
</html>
